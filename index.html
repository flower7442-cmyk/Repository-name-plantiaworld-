<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantiaWorld - 이웃과 식물을 나누는 공간</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .plant-gradient { background: linear-gradient(135deg, #f8fdf8 0%, #e8f5e9 100%); }
        .btn-primary {
            background: linear-gradient(135deg, #2e8b57 0%, #32cd32 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #228B22 0%, #2e8b57 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(34, 139, 34, 0.3);
        }
        .category-card { transition: all 0.3s ease; border: 2px solid transparent; }
        .category-card:hover {
            transform: translateY(-8px);
            border-color: #2e8b57;
            box-shadow: 0 20px 40px rgba(46, 139, 87, 0.15);
        }
        .product-card { transition: all 0.2s ease; height: 100%; cursor: pointer; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2e8b57;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sold-out-badge {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.7); color: white;
            padding: 4px 12px; border-radius: 20px;
            font-size: 11px; font-weight: bold; z-index: 10;
        }
        .price-tag { color: #1e40af; font-weight: bold; }
        .product-image-container { position: relative; padding-bottom: 100%; overflow: hidden; }
        .product-image {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease;
        }
        .product-card:hover .product-image { transform: scale(1.05); }
        
        /* 실시간 업데이트 알림 */
        .live-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 10px 16px;
            border-radius: 24px;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }
        
        .live-badge.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .hidden { display: none; }
    </style>
</head>
<body class="plant-gradient min-h-screen">

    <!-- 실시간 업데이트 알림 -->
    <div id="liveUpdateBadge" class="live-badge">
        <i class="fas fa-sync-alt fa-spin"></i>
        <span>새 상품이 등록되었습니다!</span>
        <button onclick="refreshProducts()" class="ml-2 text-xs bg-white text-green-600 px-2 py-1 rounded hover:bg-gray-100">
            새로고침
        </button>
    </div>

    <!-- 헤더 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center">
                    <i class="fas fa-leaf text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-green-800 leading-tight">PlantiaWorld</h1>
                    <p class="text-[10px] text-gray-500">이웃과 식물을 나누는 공간</p>
                </div>
            </a>
            <div class="flex items-center space-x-3">
                <!-- 마이페이지 버튼 - 로그인 상태에서만 표시 -->
                <button id="myPageBtn" class="hidden md:flex items-center text-gray-600 hover:text-green-700" onclick="goToMyPage()">
                    <i class="fas fa-user mr-1"></i><span class="text-sm">마이페이지</span>
                </button>
                
                <button class="btn-primary text-white px-5 py-2 rounded-full text-sm font-medium" onclick="location.href='add-product.html'">
                    <i class="fas fa-plus mr-1"></i>글쓰기
                </button>
                <div id="authButtons"></div>
            </div>
        </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 카테고리 섹션 -->
        <section class="mb-12">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-1 h-6 bg-green-500 rounded-full mr-2"></span>카테고리별 둘러보기
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm md:text-base">
                <button class="category-card bg-white rounded-2xl p-6 text-center shadow-sm" onclick="filterProducts('관엽식물')">
                    <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-seedling text-green-600 text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">관엽식물</h3>
                </button>
                <button class="category-card bg-white rounded-2xl p-6 text-center shadow-sm" onclick="filterProducts('다육식물')">
                    <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-spa text-green-600 text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">다육식물</h3>
                </button>
                <button class="category-card bg-white rounded-2xl p-6 text-center shadow-sm" onclick="filterProducts('화분/흙')">
                    <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-tint text-green-600 text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">화분/용품</h3>
                </button>
                <button class="category-card bg-white rounded-2xl p-6 text-center shadow-sm" onclick="filterProducts('정보공유')">
                    <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-book text-green-600 text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">정보공유</h3>
                </button>
            </div>
        </section>

        <!-- 상품 리스트 섹션 -->
        <section class="mb-10">
            <div class="flex justify-between items-end mb-6 border-b pb-4">
                <h2 class="text-2xl font-bold text-gray-800" id="sectionTitle">최신 식물</h2>
                <div class="flex items-center space-x-2">
                    <span id="productCount" class="text-sm text-gray-500">0개 상품</span>
                    <div class="flex space-x-4 text-sm font-medium">
                        <button id="sortRecentBtn" class="text-green-600" onclick="sortProducts('recent')">최신순</button>
                        <button id="sortPriceBtn" class="text-gray-400 hover:text-green-600" onclick="sortProducts('price')">가격순</button>
                    </div>
                </div>
            </div>
            
            <!-- 로딩 인디케이터 -->
            <div id="loadingIndicator" class="text-center py-8">
                <div class="loading-spinner"></div>
                <p class="mt-4 text-gray-500">상품을 불러오는 중...</p>
            </div>
            
            <!-- 상품 그리드 -->
            <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 hidden">
                <!-- 상품 카드들이 여기에 동적으로 생성됩니다 -->
            </div>
            
            <!-- 빈 상태 표시 -->
            <div id="emptyState" class="text-center py-12 hidden">
                <i class="fas fa-seedling text-4xl text-gray-300 mb-4"></i>
                <p class="text-gray-500 mb-4">등록된 상품이 없습니다.</p>
                <button onclick="location.href='add-product.html'" class="btn-primary text-white px-4 py-2 rounded-full">
                    첫 상품 등록하기
                </button>
            </div>
        </section>

        <!-- 지역 상품 섹션 -->
        <section id="localProductsSection" class="mb-10 hidden bg-white rounded-3xl p-8 shadow-sm">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">
                    <i class="fas fa-map-marker-alt text-green-600 mr-2"></i>
                    <span id="localSectionTitle">내 지역 인기 상품</span>
                </h2>
                <button class="text-gray-400 hover:text-green-600 transition-colors" onclick="refreshLocalProducts()">
                    <i class="fas fa-sync-alt mr-1"></i>새로고침
                </button>
            </div>
            <div id="localProductGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </section>
    </main>

    <!-- 푸터 -->
    <footer class="bg-gray-900 text-white py-12 mt-20">
        <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8 text-sm">
            <div>
                <div class="flex items-center space-x-2 mb-4">
                    <i class="fas fa-leaf text-green-500 text-xl"></i>
                    <h3 class="text-lg font-bold">PlantiaWorld</h3>
                </div>
                <p class="text-gray-400 leading-relaxed">이웃과 건강한 식물 문화를 나눕니다.<br>초록빛 일상을 함께 만들어가요.</p>
            </div>
            <div>
                <h4 class="font-bold mb-4">고객지원</h4>
                <ul class="space-y-2 text-gray-400">
                    <li><i class="fas fa-envelope mr-2"></i>help@plantia.world</li>
                    <li><i class="fas fa-phone mr-2"></i>010-3024-7442</li>
                </ul>
            </div>
            <div class="text-center md:text-right text-gray-500">
                <p>© 2026 PlantiaWorld. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // ========== Firebase 초기화 ==========
        const firebaseConfig = {
            apiKey: "AIzaSyA8W_2h3oI9S21-hoXKYBKs7rbdo86n6dc",
            authDomain: "plantiaworld.firebaseapp.com",
            projectId: "plantiaworld",
            storageBucket: "plantiaworld.firebasestorage.app",
            messagingSenderId: "18112813073",
            appId: "1:18112813073:web:7247046c038a3831db79b",
            measurementId: "G-8XSZM279KY"
        };

        // Firebase 초기화
        try {
            // Firebase가 이미 초기화되었는지 확인
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            } else {
                firebase.app(); // 이미 초기화된 경우
            }
            console.log("✅ Firebase 초기화 성공!");
            
            // Firestore 및 Auth 참조 가져오기
            const db = firebase.firestore();
            const auth = firebase.auth();
            
            // Firestore 설정
            if (db && db.settings) {
                db.settings({
                    timestampsInSnapshots: true
                });
            }
            
            // 테스트 함수
            testFirebaseConnection();
            
        } catch (error) {
            console.error("❌ Firebase 초기화 실패:", error);
        }

        // ========== Firebase 연결 테스트 ==========
        async function testFirebaseConnection() {
            try {
                console.log("🔗 Firebase 연결 테스트 중...");
                
                if (!db) {
                    console.error("Firestore DB가 초기화되지 않음");
                    return;
                }
                
                // 간단한 Firestore 테스트
                const testRef = db.collection('test');
                
                // 데이터 쓰기 테스트
                const docRef = await testRef.add({
                    message: 'Firebase 연결 테스트',
                    timestamp: new Date(),
                    app: 'PlantiaWorld'
                });
                console.log("📝 테스트 데이터 작성 완료:", docRef.id);
                
                // 데이터 읽기 테스트
                const snapshot = await testRef.orderBy('timestamp', 'desc').limit(5).get();
                console.log("📊 최근 테스트 데이터:", snapshot.size + "개");
                
            } catch (error) {
                console.error("❌ Firebase 연결 테스트 실패:", error);
                
                // 오류 상세 정보
                if (error.code === 'permission-denied') {
                    console.error("⚠️ Firestore 보안 규칙 확인 필요!");
                }
            }
        }

        // ========== 나머지 기존 코드 ==========
        let allProducts = [];
        let currentFilter = 'all';
        let currentSort = 'recent';
        let unsubscribeProducts = null;

        document.addEventListener('DOMContentLoaded', async () => {
            console.log('페이지 로드 시작');
            
            // Firebase 인증 상태 확인
            if (auth) {
                auth.onAuthStateChanged((user) => {
                    if (user) {
                        console.log("👤 Firebase 사용자 로그인:", user.email);
                        const userData = {
                            uid: user.uid,
                            name: user.displayName || user.email.split('@')[0],
                            email: user.email,
                            location: "서울 강남구"
                        };
                        localStorage.setItem('plantiaUser', JSON.stringify(userData));
                    } else {
                        console.log("👤 Firebase 사용자 로그아웃");
                        localStorage.removeItem('plantiaUser');
                    }
                    checkLoginStatus();
                });
            }
            
            // Firestore에서 상품 데이터 로드
            await loadProductsFromFirestore();
        });

        // ========== Firestore에서 상품 데이터 로드 ==========
        async function loadProductsFromFirestore() {
            try {
                console.log('📡 Firestore에서 상품 데이터 로드 중...');
                
                if (!db) {
                    console.error("Firestore DB가 초기화되지 않음");
                    loadFromLocalStorage();
                    return;
                }
                
                // Firestore 컬렉션 참조
                const productsRef = db.collection('products');
                
                // 기존 리스너 제거
                if (unsubscribeProducts) {
                    unsubscribeProducts();
                }
                
                // 실시간 리스너 설정
                unsubscribeProducts = productsRef
                    .where('status', '==', '판매중')
                    .orderBy('createdAt', 'desc')
                    .limit(50)
                    .onSnapshot(
                        (snapshot) => {
                            console.log('🔄 새 데이터 수신:', snapshot.size + '개');
                            
                            allProducts = [];
                            snapshot.forEach((doc) => {
                                const product = doc.data();
                                product.id = doc.id;
                                allProducts.push(product);
                            });
                            
                            // 로컬 저장소에 백업
                            localStorage.setItem('plantiaProducts', JSON.stringify(allProducts));
                            
                            // 화면 업데이트
                            displayProducts();
                            
                            // UI 업데이트
                            updateUI();
                        },
                        (error) => {
                            console.error('Firestore 리스너 오류:', error);
                            loadFromLocalStorage();
                        }
                    );
                    
            } catch (error) {
                console.error('Firestore 로드 오류:', error);
                loadFromLocalStorage();
            }
        }

        // ========== UI 업데이트 ==========
        function updateUI() {
            // 로딩 인디케이터 숨기기
            const loadingIndicator = document.getElementById('loadingIndicator');
            if (loadingIndicator) {
                loadingIndicator.classList.add('hidden');
            }
            
            // 상품 그리드 표시
            const productGrid = document.getElementById('productGrid');
            if (productGrid) {
                productGrid.classList.remove('hidden');
            }
            
            // 상품 개수 업데이트
            const productCount = document.getElementById('productCount');
            if (productCount) {
                productCount.textContent = `${allProducts.length}개 상품`;
            }
            
            // 빈 상태 체크
            const emptyState = document.getElementById('emptyState');
            if (emptyState) {
                if (allProducts.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    emptyState.classList.add('hidden');
                }
            }
        }

        // ========== 로컬 스토리지에서 데이터 로드 (백업) ==========
        function loadFromLocalStorage() {
            console.log('📂 로컬 스토리지에서 데이터 로드');
            const data = localStorage.getItem('plantiaProducts');
            allProducts = data ? JSON.parse(data) : [];
            
            if (allProducts.length === 0) {
                console.log('샘플 데이터 생성');
                allProducts = createSampleProducts();
                localStorage.setItem('plantiaProducts', JSON.stringify(allProducts));
            }
            
            updateUI();
            displayProducts();
        }

        // ========== 샘플 데이터 생성 ==========
        function createSampleProducts() {
            console.log('샘플 데이터 생성');
            return [
                {
                    id: '1',
                    title: "몬스테라 아단소니",
                    price: 12000,
                    category: "관엽식물",
                    sellerLocation: "서울 강남구",
                    likes: 12,
                    createdAt: new Date(),
                    status: "판매중",
                    description: "잎이 아주 건강해요!",
                    images: ["https://images.unsplash.com/photo-1517191434949-5e90cd67d2b6?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"]
                },
                {
                    id: '2',
                    title: "다육이 염좌",
                    price: 8000,
                    category: "다육식물",
                    sellerLocation: "부산 해운대구",
                    likes: 5,
                    createdAt: new Date(Date.now() - 3600000),
                    status: "판매중",
                    description: "귀여운 다육식물입니다.",
                    images: ["https://images.unsplash.com/photo-1485955900006-10f4d324d411?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"]
                }
            ];
        }

        // ========== 상품 표시 함수 ==========
        function displayProducts() {
            const container = document.getElementById('productGrid');
            if (!container) return;

            let filtered = currentFilter === 'all' 
                ? [...allProducts] 
                : allProducts.filter(p => p.category === currentFilter);
            
            // 정렬 적용
            if (currentSort === 'price') {
                filtered.sort((a, b) => a.price - b.price);
            } else {
                filtered.sort((a, b) => {
                    const dateA = a.createdAt ? a.createdAt.toDate() : new Date(a.createdDate || 0);
                    const dateB = b.createdAt ? b.createdAt.toDate() : new Date(b.createdDate || 0);
                    return dateB - dateA;
                });
            }

            document.getElementById('sectionTitle').textContent = currentFilter === 'all' ? '최신 식물' : currentFilter;
            
            let html = filtered.map(p => createCardHtml(p)).join('');
            
            // 로그인 상태에서만 "나도 등록하기" 버튼 표시
            const user = JSON.parse(localStorage.getItem('plantiaUser') || 'null');
            if (user) {
                html += `<div onclick="location.href='add-product.html'" class="product-card border-2 border-dashed border-green-200 rounded-2xl flex flex-col items-center justify-center p-6 text-green-600 hover:bg-green-50 min-h-[200px] cursor-pointer">
                            <i class="fas fa-plus-circle text-3xl mb-2"></i>
                            <span class="font-medium">나도 등록하기</span>
                        </div>`;
            }
            
            container.innerHTML = html;
        }

        function createCardHtml(p) {
            const isFree = p.price === 0;
            const thumbnail = (p.images && p.images.length > 0) 
                ? p.images[0] 
                : `https://images.unsplash.com/photo-1416879595882-3373a0480b5b?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=60`;
            
            // 시간 계산
            let timeAgo = '방금 전';
            if (p.createdAt) {
                try {
                    const createdTime = p.createdAt.toDate ? p.createdAt.toDate() : new Date(p.createdAt);
                    const now = new Date();
                    const diffInMinutes = Math.floor((now - createdTime) / (1000 * 60));
                    
                    if (diffInMinutes < 1) {
                        timeAgo = '방금 전';
                    } else if (diffInMinutes < 60) {
                        timeAgo = `${diffInMinutes}분 전`;
                    } else if (diffInMinutes < 1440) {
                        const hours = Math.floor(diffInMinutes / 60);
                        timeAgo = `${hours}시간 전`;
                    } else {
                        const days = Math.floor(diffInMinutes / 1440);
                        timeAgo = `${days}일 전`;
                    }
                } catch (e) {
                    timeAgo = '시간 정보 없음';
                }
            }
            
            return `
                <div class="product-card bg-white rounded-2xl overflow-hidden shadow-sm flex flex-col cursor-pointer relative" onclick="location.href='product-detail.html?id=${p.id}'">
                    <!-- 실시간 배지 -->
                    <div class="absolute top-2 right-2 bg-green-500 text-white text-xs px-2 py-1 rounded-full z-10">
                        <i class="fas fa-circle text-[6px] mr-1"></i>실시간
                    </div>
                    
                    <div class="product-image-container">
                        <img src="${thumbnail}" class="product-image" alt="${p.title}" loading="lazy" 
                             onerror="this.src='https://images.unsplash.com/photo-1416879595882-3373a0480b5b?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=60'">
                        ${isFree ? '<div class="sold-out-badge bg-green-600">무료나눔</div>' : ''}
                        ${p.status === '판매완료' ? '<div class="sold-out-badge bg-red-600">판매완료</div>' : ''}
                    </div>
                    <div class="p-4 flex flex-col flex-grow">
                        <h3 class="text-sm font-semibold text-gray-800 line-clamp-2 mb-2">${p.title}</h3>
                        <div class="mt-auto">
                            <p class="price-tag text-base mb-1">${isFree ? '나눔 🌱' : p.price.toLocaleString() + '원'}</p>
                            <div class="flex items-center justify-between text-[10px] text-gray-400">
                                <span class="flex items-center">
                                    <i class="fas fa-map-marker-alt mr-1"></i>
                                    ${p.sellerLocation || p.location || '지역 정보 없음'}
                                </span>
                                <span>${timeAgo}</span>
                            </div>
                            <div class="flex items-center justify-between text-[10px] text-gray-400 border-t pt-2 mt-2">
                                <span>${p.category || '기타'}</span>
                                <div class="flex items-center space-x-2">
                                    <span><i class="far fa-heart mr-0.5"></i>${p.likes || 0}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        // ========== 로그인 상태 관리 ==========
        function checkLoginStatus() {
            const user = JSON.parse(localStorage.getItem('plantiaUser') || 'null');
            const authDiv = document.getElementById('authButtons');
            const myPageBtn = document.getElementById('myPageBtn');
            
            if (user) {
                // 로그인된 상태
                authDiv.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="hidden md:flex flex-col text-right">
                            <span class="text-xs text-gray-500">안녕하세요</span>
                            <span class="text-sm font-medium text-gray-700">${user.name || '사용자'}님</span>
                        </div>
                        <button onclick="logout()" class="w-8 h-8 bg-green-100 rounded-full text-green-700 font-bold flex items-center justify-center border border-green-200 hover:bg-green-200 transition">
                            ${user.name ? user.name[0].toUpperCase() : 'U'}
                        </button>
                    </div>
                `;
                
                // 마이페이지 버튼 표시
                myPageBtn.classList.remove('hidden');
                myPageBtn.innerHTML = `<i class="fas fa-user-circle mr-1"></i><span class="text-sm">마이페이지</span>`;
                
                // 지역 상품 섹션 표시
                document.getElementById('localProductsSection').classList.remove('hidden');
                displayLocalProducts();
            } else {
                // 로그인 안 된 상태
                authDiv.innerHTML = `
                    <button onclick="goToLogin()" class="flex items-center space-x-2 text-gray-600 hover:text-green-700">
                        <i class="fas fa-user"></i>
                        <span class="text-sm hidden md:inline">로그인</span>
                    </button>
                `;
                
                // 마이페이지 버튼 숨기기
                myPageBtn.classList.add('hidden');
            }
        }

        // ========== 지역 상품 표시 ==========
        function displayLocalProducts() {
            const user = JSON.parse(localStorage.getItem('plantiaUser') || 'null');
            if (!user || !user.location) return;
            
            const grid = document.getElementById('localProductGrid');
            const section = document.getElementById('localProductsSection');
            
            if (!grid || !section) return;
            
            const userCity = user.location.split(' ')[0];
            const localItems = allProducts.filter(p => 
                (p.sellerLocation || p.location || '').includes(userCity)
            ).slice(0, 6);
            
            if (localItems.length > 0) {
                grid.innerHTML = localItems.map(p => createCardHtml(p)).join('');
                document.getElementById('localSectionTitle').textContent = `${user.location} 인기 식물`;
                section.classList.remove('hidden');
            } else {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-6 text-gray-500">
                        <p>지역 상품이 없습니다.</p>
                    </div>
                `;
            }
        }

        // ========== 기타 함수 ==========
        function goToMyPage() {
            const user = JSON.parse(localStorage.getItem('plantiaUser'));
            if (user) {
                window.location.href = 'my-page.html';
            } else {
                alert('로그인이 필요합니다.');
                goToLogin();
            }
        }

        function goToLogin() {
            window.location.href = 'login.html';
        }

        async function logout() {
            if(confirm('로그아웃 하시겠습니까?')) { 
                try {
                    if (auth) {
                        await auth.signOut();
                    }
                    localStorage.removeItem('plantiaUser'); 
                    location.reload();
                } catch (error) {
                    console.error('로그아웃 오류:', error);
                    alert('로그아웃 중 오류가 발생했습니다.');
                }
            }
        }

        function filterProducts(cat) { 
            currentFilter = cat; 
            displayProducts(); 
        }
        
        function sortProducts(type) {
            currentSort = type;
            document.getElementById('sortRecentBtn').className = type === 'recent' ? 'text-green-600 font-medium' : 'text-gray-400 hover:text-green-600';
            document.getElementById('sortPriceBtn').className = type === 'price' ? 'text-green-600 font-medium' : 'text-gray-400 hover:text-green-600';
            displayProducts();
        }
        
        function refreshProducts() {
            location.reload();
        }
        
        function refreshLocalProducts() { 
            displayLocalProducts(); 
            alert('지역 상품 목록이 새로고침 되었습니다.');
        }

        // 페이지 언로드 시 리스너 정리
        window.addEventListener('beforeunload', () => {
            if (unsubscribeProducts) {
                unsubscribeProducts();
            }
        });
    </script>
</body>
</html>
