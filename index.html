<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantiaWorld - 이웃과 식물을 나누는 공간</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .plant-gradient { background: linear-gradient(135deg, #f8fdf8 0%, #e8f5e9 100%); }
        .btn-primary {
            background: linear-gradient(135deg, #2e8b57 0%, #32cd32 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #228B22 0%, #2e8b57 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(34, 139, 34, 0.3);
        }
        .category-card { transition: all 0.3s ease; border: 2px solid transparent; }
        .category-card:hover {
            transform: translateY(-8px);
            border-color: #2e8b57;
            box-shadow: 0 20px 40px rgba(46, 139, 87, 0.15);
        }
        .product-card { transition: all 0.2s ease; height: 100%; cursor: pointer; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2e8b57;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sold-out-badge {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.7); color: white;
            padding: 4px 12px; border-radius: 20px;
            font-size: 11px; font-weight: bold; z-index: 10;
        }
        .price-tag { color: #1e40af; font-weight: bold; }
        .product-image-container { position: relative; padding-bottom: 100%; overflow: hidden; }
        .product-image {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease;
        }
        .product-card:hover .product-image { transform: scale(1.05); }
    </style>
</head>
<body class="plant-gradient min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center">
                    <i class="fas fa-leaf text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-green-800 leading-tight">PlantiaWorld</h1>
                    <p class="text-[10px] text-gray-500">이웃과 식물을 나누는 공간</p>
                </div>
            </a>
            <div class="flex items-center space-x-3">
                <!-- 마이페이지 버튼 - 로그인 상태에서만 표시 -->
                <button id="myPageBtn" class="hidden md:flex items-center text-gray-600 hover:text-green-700" onclick="goToMyPage()">
                    <i class="fas fa-user mr-1"></i><span class="text-sm">마이페이지</span>
                </button>
                
                <button class="btn-primary text-white px-5 py-2 rounded-full text-sm font-medium" onclick="location.href='add-product.html'">
                    <i class="fas fa-plus mr-1"></i>글쓰기
                </button>
                <div id="authButtons"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <section class="mb-12">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-1 h-6 bg-green-500 rounded-full mr-2"></span>카테고리별 둘러보기
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm md:text-base">
                <button class="category-card bg-white rounded-2xl p-6 text-center shadow-sm" onclick="filterProducts('관엽식물')">
                    <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-seedling text-green-600 text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">관엽식물</h3>
                </button>
                <button class="category-card bg-white rounded-2xl p-6 text-center shadow-sm" onclick="filterProducts('다육식물')">
                    <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-spa text-green-600 text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">다육식물</h3>
                </button>
                <button class="category-card bg-white rounded-2xl p-6 text-center shadow-sm" onclick="filterProducts('화분/흙')">
                    <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-tint text-green-600 text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">화분/용품</h3>
                </button>
                <button class="category-card bg-white rounded-2xl p-6 text-center shadow-sm" onclick="filterProducts('정보공유')">
                    <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-book text-green-600 text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">정보공유</h3>
                </button>
            </div>
        </section>

        <section class="mb-10">
            <div class="flex justify-between items-end mb-6 border-b pb-4">
                <h2 class="text-2xl font-bold text-gray-800" id="sectionTitle">최신 식물</h2>
                <div class="flex space-x-4 text-sm font-medium">
                    <button id="sortRecentBtn" class="text-green-600" onclick="sortProducts('recent')">최신순</button>
                    <button id="sortPriceBtn" class="text-gray-400 hover:text-green-600" onclick="sortProducts('price')">가격순</button>
                </div>
            </div>
            <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                </div>
        </section>

        <section id="localProductsSection" class="mb-10 hidden bg-white rounded-3xl p-8 shadow-sm">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">
                    <i class="fas fa-map-marker-alt text-green-600 mr-2"></i>
                    <span id="localSectionTitle">내 지역 인기 상품</span>
                </h2>
                <button class="text-gray-400 hover:text-green-600 transition-colors" onclick="refreshLocalProducts()">
                    <i class="fas fa-sync-alt mr-1"></i>새로고침
                </button>
            </div>
            <div id="localProductGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </section>
    </main>

    <footer class="bg-gray-900 text-white py-12 mt-20">
        <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8 text-sm">
            <div>
                <div class="flex items-center space-x-2 mb-4">
                    <i class="fas fa-leaf text-green-500 text-xl"></i>
                    <h3 class="text-lg font-bold">PlantiaWorld</h3>
                </div>
                <p class="text-gray-400 leading-relaxed">이웃과 건강한 식물 문화를 나눕니다.<br>초록빛 일상을 함께 만들어가요.</p>
            </div>
            <div>
                <h4 class="font-bold mb-4">고객지원</h4>
                <ul class="space-y-2 text-gray-400">
                    <li><i class="fas fa-envelope mr-2"></i>help@plantia.world</li>
                    <li><i class="fas fa-phone mr-2"></i>010-3024-7442</li>
                </ul>
            </div>
            <div class="text-center md:text-right text-gray-500">
                <p>© 2026 PlantiaWorld. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        let allProducts = [];
        let currentFilter = 'all';
        let currentSort = 'recent';

        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            checkLoginStatus(); // 로그인 상태 확인
            displayProducts();
            displayLocalProducts();
        });

        function loadProducts() {
            // 로컬스토리지에서 상품 가져오기
            const data = localStorage.getItem('plantiaProducts');
            allProducts = data ? JSON.parse(data) : [];
            
            // 데이터가 아예 없으면 샘플 생성
            if (allProducts.length === 0) {
                allProducts = [
                    { 
                        id: 1, 
                        title: "몬스테라 아단소니", 
                        price: 12000, 
                        category: "관엽식물", 
                        status: "판매중", 
                        sellerLocation: "부산 해운대구", 
                        likes: 12, 
                        createdDate: "2024-01-20", 
                        description: "잎이 아주 건강해요!", 
                        images: ["https://images.unsplash.com/photo-1517191434949-5e90cd67d2b6?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"]
                    },
                    { 
                        id: 2, 
                        title: "다육이 염좌", 
                        price: 25000, 
                        category: "다육식물", 
                        status: "판매중", 
                        sellerLocation: "서울 강남구", 
                        likes: 5, 
                        createdDate: "2024-01-22", 
                        description: "대형 화분 포함입니다.", 
                        images: ["https://images.unsplash.com/photo-1485955900006-10f4d324d411?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"]
                    },
                    { 
                        id: 3, 
                        title: "테라코타 화분 세트", 
                        price: 15000, 
                        category: "화분/용품", 
                        status: "판매중", 
                        sellerLocation: "서울 서초구", 
                        likes: 8, 
                        createdDate: "2024-01-18", 
                        description: "고급 테라코타 화분 3종 세트", 
                        images: ["https://images.unsplash.com/photo-1426170042593-200f250dfdaf?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"]
                    },
                    { 
                        id: 4, 
                        title: "선인장 무료나눔", 
                        price: 0, 
                        category: "다육식물", 
                        status: "판매중", 
                        sellerLocation: "서울 마포구", 
                        likes: 15, 
                        createdDate: "2024-01-15", 
                        description: "잘 자란 선인장 나눔합니다", 
                        images: ["https://images.unsplash.com/photo-1459411552884-841db9b3cc2a?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"]
                    }
                ];
                localStorage.setItem('plantiaProducts', JSON.stringify(allProducts));
            }
        }

        function displayProducts() {
            const container = document.getElementById('productGrid');
            if (!container) return;

            let filtered = currentFilter === 'all' ? [...allProducts] : allProducts.filter(p => p.category === currentFilter);
            
            if (currentSort === 'price') filtered.sort((a, b) => a.price - b.price);
            else filtered.sort((a, b) => new Date(b.createdDate) - new Date(a.createdDate));

            document.getElementById('sectionTitle').textContent = currentFilter === 'all' ? '최신 식물' : currentFilter;
            
            let html = filtered.map(p => createCardHtml(p)).join('');
            // 등록 카드 추가
            html += `<div onclick="location.href='add-product.html'" class="product-card border-2 border-dashed border-green-200 rounded-2xl flex flex-col items-center justify-center p-6 text-green-600 hover:bg-green-50 min-h-[200px] cursor-pointer">
                        <i class="fas fa-plus-circle text-3xl mb-2"></i><span class="font-medium">나도 등록하기</span>
                    </div>`;
            container.innerHTML = html;
        }

        function createCardHtml(p) {
            const isFree = p.price === 0;
            // 이미지가 있으면 첫 번째 이미지, 없으면 샘플 이미지 사용
            const thumbnail = (p.images && p.images.length > 0) ? p.images[0] : `https://images.unsplash.com/photo-1416879595882-3373a0480b5b?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=60`;
            
            return `
                <div class="product-card bg-white rounded-2xl overflow-hidden shadow-sm flex flex-col cursor-pointer" onclick="location.href='product-detail.html?id=${p.id}'">
                    <div class="product-image-container">
                        <img src="${thumbnail}" class="product-image" alt="${p.title}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1416879595882-3373a0480b5b?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=60'">
                        ${isFree ? '<div class="sold-out-badge bg-green-600">무료나눔</div>' : ''}
                    </div>
                    <div class="p-4 flex flex-col flex-grow">
                        <h3 class="text-sm font-semibold text-gray-800 line-clamp-2 mb-2 h-10">${p.title}</h3>
                        <div class="mt-auto">
                            <p class="price-tag text-base mb-2">${isFree ? '나눔 🌱' : p.price.toLocaleString() + '원'}</p>
                            <div class="flex items-center justify-between text-[11px] text-gray-400 border-t pt-2">
                                <span>${p.sellerLocation || p.location || '지역 정보 없음'}</span>
                                <div class="flex items-center space-x-2">
                                    <span><i class="far fa-heart mr-0.5"></i>${p.likes || 0}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function checkLoginStatus() {
            const user = JSON.parse(localStorage.getItem('plantiaUser') || 'null');
            const authDiv = document.getElementById('authButtons');
            const myPageBtn = document.getElementById('myPageBtn');
            
            if (user) {
                // 로그인된 상태
                authDiv.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="hidden md:flex flex-col text-right">
                            <span class="text-xs text-gray-500">안녕하세요</span>
                            <span class="text-sm font-medium text-gray-700">${user.name || '사용자'}님</span>
                        </div>
                        <button onclick="logout()" class="w-8 h-8 bg-green-100 rounded-full text-green-700 font-bold flex items-center justify-center border border-green-200 hover:bg-green-200 transition">
                            ${user.name ? user.name[0].toUpperCase() : 'U'}
                        </button>
                    </div>
                `;
                
                // 마이페이지 버튼 표시
                myPageBtn.classList.remove('hidden');
                myPageBtn.innerHTML = `<i class="fas fa-user-circle mr-1"></i><span class="text-sm">마이페이지</span>`;
                
                // 지역 상품 섹션 표시
                document.getElementById('localProductsSection').classList.remove('hidden');
            } else {
                // 로그인 안 된 상태
                authDiv.innerHTML = `
                    <button onclick="location.href='login.html'" class="flex items-center space-x-2 text-gray-600 hover:text-green-700">
                        <i class="fas fa-user"></i>
                        <span class="text-sm hidden md:inline">로그인</span>
                    </button>
                `;
                
                // 마이페이지 버튼 숨기기
                myPageBtn.classList.add('hidden');
            }
        }

        function displayLocalProducts() {
            const user = JSON.parse(localStorage.getItem('plantiaUser') || 'null');
            if (!user || !user.location) return;
            const grid = document.getElementById('localProductGrid');
            const section = document.getElementById('localProductsSection');
            
            if (!grid || !section) return;
            
            const userCity = user.location.split(' ')[0]; // '서울 강남구' -> '서울'
            const localItems = allProducts.filter(p => 
                (p.sellerLocation || p.location || '').includes(userCity)
            ).slice(0, 6);
            
            if (localItems.length > 0) {
                grid.innerHTML = localItems.map(p => createCardHtml(p)).join('');
                document.getElementById('localSectionTitle').textContent = `${user.location} 인기 식물`;
                section.classList.remove('hidden');
            } else {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-6 text-gray-500">
                        <p>지역 상품이 없습니다.</p>
                    </div>
                `;
            }
        }

        // 마이페이지로 이동
        function goToMyPage() {
            const user = JSON.parse(localStorage.getItem('plantiaUser'));
            if (user) {
                window.location.href = 'my-page.html';
            } else {
                alert('로그인이 필요합니다.');
                window.location.href = 'login.html';
            }
        }

        // 로그아웃
        function logout() {
            if(confirm('로그아웃 하시겠습니까?')) { 
                localStorage.removeItem('plantiaUser'); 
                location.reload(); 
            }
        }

        function filterProducts(cat) { 
            currentFilter = cat; 
            displayProducts(); 
        }
        
        function sortProducts(type) {
            currentSort = type;
            document.getElementById('sortRecentBtn').className = type === 'recent' ? 'text-green-600' : 'text-gray-400 hover:text-green-600';
            document.getElementById('sortPriceBtn').className = type === 'price' ? 'text-green-600' : 'text-gray-400 hover:text-green-600';
            displayProducts();
        }
        
        function showFavorites() { 
            alert('관심 상품 기능은 로그인 후 이용 가능합니다.'); 
        }
        
        function refreshLocalProducts() { 
            displayLocalProducts(); 
            alert('지역 상품 목록이 새로고침 되었습니다.');
        }
    </script>
</body>
</html>
