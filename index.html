
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .plant-gradient {
            background: linear-gradient(135deg, #f8fdf8 0%, #e8f5e9 100%);
        }
        .btn-primary {
            background: linear-gradient(135deg, #2e8b57 0%, #32cd32 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #228B22 0%, #2e8b57 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(34, 139, 34, 0.3);
        }
        .category-card {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .category-card:hover {
            transform: translateY(-8px);
            border-color: #2e8b57;
            box-shadow: 0 20px 40px rgba(46, 139, 87, 0.15);
        }
        .product-card {
            transition: all 0.2s ease;
            height: 100%;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2e8b57;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .sold-out-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .price-tag {
            color: #1e40af;
            font-weight: bold;
        }
        .location-tag {
            font-size: 12px;
            color: #666;
        }
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-image-container {
            position: relative;
            padding-bottom: 100%;
            overflow: hidden;
        }
        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

        // 전역 변수
        let allProducts = [];
        let currentFilter = 'all';
        let currentSort = 'recent';

        // 페이지 로드
        document.addEventListener('DOMContentLoaded', function() {
            console.log('페이지 로드 시작');
            initializeData();
            setupEventListeners();
        });

        // 데이터 초기화
        function initializeData() {
            // 샘플 데이터 생성
            createSampleData();
            
            // 상품 데이터 로드
            loadProducts();
            
            // 로그인 상태 확인
            checkLoginStatus();
            
            // 2초 후 로딩 스피너 제거
            setTimeout(() => {
                const spinner = document.querySelector('.loading-spinner');
                if (spinner && spinner.parentElement) {
                    spinner.parentElement.remove();
                    displayProducts();
                }
            }, 2000);
        }

        // 상품 데이터 로드
        function loadProducts() {
            try {
                const productsData = localStorage.getItem('plantiaProducts');
                if (productsData) {
                    allProducts = JSON.parse(productsData);
                    console.log('상품 데이터 로드 완료:', allProducts.length + '개');
                }
            } catch (error) {
                console.error('데이터 로드 오류:', error);
                allProducts = [];
            }
        }

        // 상품 표시
        function displayProducts() {
            const container = document.getElementById('productGrid');
            if (!container) return;

            // 필터링
            let filteredProducts = [...allProducts];
            if (currentFilter !== 'all') {
                filteredProducts = allProducts.filter(product => 
                    product.category === currentFilter
                );
            }

            // 정렬
            if (currentSort === 'price') {
                filteredProducts.sort((a, b) => a.price - b.price);
            } else {
                filteredProducts.sort((a, b) => new Date(b.createdDate) - new Date(a.createdDate));
            }

            // 섹션 제목 업데이트
            const sectionTitle = document.getElementById('sectionTitle');
            if (sectionTitle) {
                if (currentFilter === 'all') {
                    sectionTitle.textContent = currentSort === 'recent' ? '최신 식물' : '인기 식물';
                } else {
                    sectionTitle.textContent = currentFilter;
                }
            }

            // 상품이 없을 때
            if (filteredProducts.length === 0) {
                container.innerHTML = `
                    <div class="col-span-2 md:col-span-3 lg:col-span-6 bg-green-50 rounded-2xl p-8 text-center">
                        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-leaf text-green-600 text-2xl"></i>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2">등록된 상품이 없습니다</h3>
                        <p class="text-gray-600 mb-6">첫 번째 상품을 등록하고 이웃과 나눠보세요!</p>
                        <button onclick="window.location.href='add-product.html'" 
                               class="btn-primary text-white px-6 py-3 rounded-full font-medium">
                            <i class="fas fa-plus mr-2"></i>상품 등록하기
                        </button>
                    </div>
                `;
                return;
            }

            // 상품 카드 생성
            container.innerHTML = '';
            filteredProducts.forEach(product => {
                container.innerHTML += createProductCard(product);
            });

            // 상품 등록하기 카드 추가
            container.innerHTML += `
                <button onclick="window.location.href='add-product.html'" class="product-card bg-white rounded-xl overflow-hidden shadow-sm flex items-center justify-center border-2 border-dashed border-green-200 hover:border-green-400 w-full">
                    <div class="text-center p-6">
                        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-plus text-green-600 text-2xl"></i>
                        </div>
                        <p class="text-green-600 font-medium">상품 등록하기</p>
                    </div>
                </button>
            `;
        }

        // 상품 카드 생성
        function createProductCard(product) {
            const imageUrl = 'https://images.unsplash.com/photo-1416879595882-3373a0480b5b?auto=format&fit=crop&w=500';
            const isFree = product.price === 0;
            const priceText = isFree ? '무료나눔' : `${Number(product.price).toLocaleString()}원`;

            return `
                <button onclick="viewProduct(${product.id})" class="product-card bg-white rounded-xl overflow-hidden shadow-sm block w-full text-left p-0">
                    <div class="product-image-container">
                        <img src="${imageUrl}" alt="${product.title}" class="product-image">
                        ${product.status === '판매완료' ? '<div class="sold-out-badge">판매완료</div>' : ''}
                        ${isFree ? '<div class="sold-out-badge bg-green-600">무료나눔</div>' : ''}
                    </div>
                    <div class="p-3">
                        <h3 class="font-medium text-gray-800 truncate mb-1">${product.title}</h3>
                        <div class="flex items-center justify-between">
                            <span class="price-tag">${priceText}</span>
                            <div class="flex items-center text-gray-400">
                                <i class="far fa-heart text-sm"></i>
                                <span class="text-xs ml-1">${product.likes || 0}</span>
                            </div>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <span class="location-tag">${product.sellerLocation || '지역정보'}</span>
                            <span class="text-xs text-gray-400">${formatDate(product.createdDate)}</span>
                        </div>
                    </div>
                </button>
            `;
        }

        // 상품 보기
        function viewProduct(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (product) {
                alert(`상품 상세보기\n\n제목: ${product.title}\n가격: ${product.price === 0 ? '무료나눔' : product.price.toLocaleString() + '원'}\n지역: ${product.sellerLocation}\n설명: ${product.description}`);
            }
        }

        // 날짜 포맷팅
        function formatDate(dateString) {
            try {
                const date = new Date(dateString);
                const now = new Date();
                const diffTime = Math.abs(now - date);
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                
                if (diffDays === 0) return '오늘';
                if (diffDays === 1) return '어제';
                if (diffDays < 7) return `${diffDays}일전`;
                if (diffDays < 30) return `${Math.floor(diffDays/7)}주전`;
                return date.toLocaleDateString('ko-KR');
            } catch (error) {
                return '날짜정보';
            }
        }

        // 지역별 상품 표시
        function displayLocalProducts() {
            const user = localStorage.getItem('plantiaUser');
            if (!user) {
                const localSection = document.getElementById('localProductsSection');
                if (localSection) localSection.classList.add('hidden');
                return;
            }

            const userData = JSON.parse(user);
            const userProvince = userData.location ? userData.location.split(' ')[0] : '서울';
            const localProducts = allProducts.filter(product => 
                product.sellerLocation && product.sellerLocation.includes(userProvince)
            );

            const section = document.getElementById('localProductsSection');
            const title = document.getElementById('localSectionTitle');
            const grid = document.getElementById('localProductGrid');

            if (section && title && grid) {
                if (localProducts.length > 0) {
                    section.classList.remove('hidden');
                    title.textContent = `${userData.location} 상품`;
                    
                    grid.innerHTML = '';
                    localProducts.slice(0, 6).forEach(product => {
                        grid.innerHTML += createProductCard(product);
                    });
                } else {
                    section.classList.add('hidden');
                }
            }
        }

        // 새로고침 기능 (중요!)
        function refreshLocalProducts() {
            console.log('새로고침 시작');
            
            // 버튼 로딩 상태
            const refreshBtn = document.querySelector('button[onclick="refreshLocalProducts()"]');
            if (refreshBtn) {
                const originalText = refreshBtn.innerHTML;
                refreshBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>새로고침 중';
                refreshBtn.disabled = true;
                
                // 데이터 재로드
                setTimeout(() => {
                    loadProducts();
                    displayLocalProducts();
                    
                    // 버튼 복원
                    refreshBtn.innerHTML = originalText;
                    refreshBtn.disabled = false;
                    
                    // 메시지 표시
                    showMessage('지역 상품을 새로고침했습니다!', 'success');
                    console.log('새로고침 완료');
                }, 1000);
            }
        }

        // 로그인 상태 확인
        function checkLoginStatus() {
            const user = localStorage.getItem('plantiaUser');
            const authButtons = document.getElementById('authButtons');
            
            if (user) {
                const userData = JSON.parse(user);
                authButtons.innerHTML = `
                    <div class="flex items-center">
                        <button class="flex items-center text-gray-700 hover:text-green-700" onclick="showUserMenu()">
                            <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center mr-2">
                                <span class="text-green-600 font-bold">${userData.name.charAt(0)}</span>
                            </div>
                            <span class="hidden md:inline">${userData.name}</span>
                            <i class="fas fa-chevron-down ml-1 text-xs"></i>
                        </button>
                    </div>
                `;
                
                // 지역별 상품 표시
                displayLocalProducts();
            } else {
                authButtons.innerHTML = `
                    <a href="login.html" class="flex items-center text-gray-700 hover:text-green-700">
                        <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center">
                            <i class="fas fa-user text-gray-600"></i>
                        </div>
                        <span class="ml-2 hidden md:inline">로그인</span>
                    </a>
                `;
            }
        }

        // 사용자 메뉴
        function showUserMenu() {
            const user = JSON.parse(localStorage.getItem('plantiaUser') || '{}');
            const choice = confirm(`${user.name}님\n\n1. 내 상품 보기\n2. 로그아웃\n\n취소를 누르면 닫힙니다.`);
            
            if (choice) {
                if (confirm('로그아웃 하시겠습니까?')) {
                    localStorage.removeItem('plantiaUser');
                    location.reload();
                }
            }
        }

        // 관심 목록 보기
        function showFavorites() {
            const likedProducts = JSON.parse(localStorage.getItem('likedProducts') || '[]');
            if (likedProducts.length > 0) {
                alert(`관심 상품 ${likedProducts.length}개가 있습니다.`);
            } else {
                alert('아직 관심 상품이 없습니다.');
            }
        }

        // 상품 필터링
        function filterProducts(category) {
            currentFilter = category;
            displayProducts();
        }

        // 상품 정렬
        function sortProducts(type) {
            currentSort = type;
            
            const priceBtn = document.getElementById('sortPriceBtn');
            const recentBtn = document.getElementById('sortRecentBtn');
            
            if (priceBtn && recentBtn) {
                if (type === 'price') {
                    priceBtn.classList.remove('text-gray-600');
                    priceBtn.classList.add('text-green-600');
                    recentBtn.classList.remove('text-green-600');
                    recentBtn.classList.add('text-gray-600');
                } else {
                    recentBtn.classList.remove('text-gray-600');
                    recentBtn.classList.add('text-green-600');
                    priceBtn.classList.remove('text-green-600');
                    priceBtn.classList.add('text-gray-600');
                }
            }
            
            displayProducts();
        }

        // 메시지 표시
        function showMessage(message, type) {
            const messageBox = document.createElement('div');
            messageBox.className = `fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-lg z-50 ${
                type === 'success' 
                    ? 'bg-green-100 text-green-700 border border-green-300' 
                    : 'bg-red-100 text-red-700 border border-red-300'
            }`;
            messageBox.innerHTML = `
                <div class="flex items-center">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} mr-2"></i>
                    <span class="font-medium">${message}</span>
                </div>
            `;
            
            document.body.appendChild(messageBox);
            
            setTimeout(() => {
                if (messageBox.parentElement) {
                    messageBox.remove();
                }
            }, 3000);
        }

        // 이벤트 리스너 설정
        function setupEventListeners() {
            // 로컬스토리지 변경 감지
            window.addEventListener('storage', function(e) {
                if (e.key === 'plantiaProducts') {
                    console.log('상품 데이터 변경 감지');
                    loadProducts();
                    displayProducts();
                    displayLocalProducts();
                }
            });
        }
    </script>
</body>
