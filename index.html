<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantiaWorld - 이웃과 식물을 나누는 공간</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .plant-gradient { background: linear-gradient(135deg, #f8fdf8 0%, #e8f5e9 100%); }
        .btn-primary {
            background: linear-gradient(135deg, #2e8b57 0%, #32cd32 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #228B22 0%, #2e8b57 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(34, 139, 34, 0.3);
        }
        .category-card { transition: all 0.3s ease; border: 2px solid transparent; }
        .category-card:hover {
            transform: translateY(-8px);
            border-color: #2e8b57;
            box-shadow: 0 20px 40px rgba(46, 139, 87, 0.15);
        }
        .product-card { transition: all 0.2s ease; height: 100%; cursor: pointer; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2e8b57;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sold-out-badge {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.7); color: white;
            padding: 4px 12px; border-radius: 20px;
            font-size: 11px; font-weight: bold; z-index: 10;
        }
        .price-tag { color: #1e40af; font-weight: bold; }
        .product-image-container { position: relative; padding-bottom: 100%; overflow: hidden; }
        .product-image {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease;
        }
        .product-card:hover .product-image { transform: scale(1.05); }
    </style>
</head>
<body class="plant-gradient min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center">
                    <i class="fas fa-leaf text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-green-800 leading-tight">PlantiaWorld</h1>
                    <p class="text-[10px] text-gray-500">이웃과 식물을 나누는 공간</p>
                </div>
            </a>
            <div class="flex items-center space-x-3">
                <button class="hidden md:flex items-center text-gray-600 hover:text-green-700" onclick="showFavorites()">
                    <i class="far fa-heart mr-1"></i><span class="text-sm">관심</span>
                </button>
                <button class="btn-primary text-white px-5 py-2 rounded-full text-sm font-medium" onclick="location.href='add-product.html'">
                    <i class="fas fa-plus mr-1"></i>글쓰기
                </button>
                <div id="authButtons"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <section class="mb-12">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-1 h-6 bg-green-500 rounded-full mr-2"></span>카테고리별 둘러보기
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm md:text-base">
                <button class="category-card bg-white rounded-2xl p-6 text-center shadow-sm" onclick="filterProducts('관엽식물')">
                    <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-seedling text-green-600 text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">관엽식물</h3>
                </button>
                <button class="category-card bg-white rounded-2xl p-6 text-center shadow-sm" onclick="filterProducts('다육이')">
                    <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-spa text-green-600 text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">다육식물</h3>
                </button>
                <button class="category-card bg-white rounded-2xl p-6 text-center shadow-sm" onclick="filterProducts('화분/흙')">
                    <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-tint text-green-600 text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">화분/용품</h3>
                </button>
                <button class="category-card bg-white rounded-2xl p-6 text-center shadow-sm" onclick="filterProducts('정보공유')">
                    <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-book text-green-600 text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800">정보공유</h3>
                </button>
            </div>
        </section>

        <section class="mb-10">
            <div class="flex justify-between items-end mb-6 border-b pb-4">
                <h2 class="text-2xl font-bold text-gray-800" id="sectionTitle">최신 식물</h2>
                <div class="flex space-x-4 text-sm font-medium">
                    <button id="sortRecentBtn" class="text-green-600" onclick="sortProducts('recent')">최신순</button>
                    <button id="sortPriceBtn" class="text-gray-400 hover:text-green-600" onclick="sortProducts('price')">가격순</button>
                </div>
            </div>
            <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <div class="col-span-full py-20 flex flex-col items-center justify-center">
                    <div class="loading-spinner mb-4"></div>
                    <p class="text-gray-500 animate-pulse">우리 동네 식물들을 불러오고 있어요...</p>
                </div>
            </div>
        </section>

        <section id="localProductsSection" class="mb-10 hidden bg-white rounded-3xl p-8 shadow-sm">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">
                    <i class="fas fa-map-marker-alt text-green-600 mr-2"></i>
                    <span id="localSectionTitle">내 지역 인기 상품</span>
                </h2>
                <button class="text-gray-400 hover:text-green-600 transition-colors" onclick="refreshLocalProducts()">
                    <i class="fas fa-sync-alt mr-1"></i>새로고침
                </button>
            </div>
            <div id="localProductGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </section>
    </main>

    <footer class="bg-gray-900 text-white py-12 mt-20">
        <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8 text-sm">
            <div>
                <div class="flex items-center space-x-2 mb-4">
                    <i class="fas fa-leaf text-green-500 text-xl"></i>
                    <h3 class="text-lg font-bold">PlantiaWorld</h3>
                </div>
                <p class="text-gray-400 leading-relaxed">이웃과 건강한 식물 문화를 나눕니다.<br>초록빛 일상을 함께 만들어가요.</p>
            </div>
            <div>
                <h4 class="font-bold mb-4">고객지원</h4>
                <ul class="space-y-2 text-gray-400">
                    <li><i class="fas fa-envelope mr-2"></i>help@plantia.world</li>
                    <li><i class="fas fa-phone mr-2"></i>010-3024-7442</li>
                </ul>
            </div>
            <div class="text-center md:text-right text-gray-500">
                <p>© 2026 PlantiaWorld. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div id="productModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/60 backdrop-blur-sm" onclick="handleOutsideClick(event)">
        <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl max-h-[90vh] overflow-y-auto relative" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 right-4 z-10 bg-white/80 rounded-full w-10 h-10 flex items-center justify-center shadow-md hover:bg-white transition-colors">
                <i class="fas fa-times text-gray-800"></i>
            </button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        let allProducts = [];
        let currentFilter = 'all';
        let currentSort = 'recent';

        document.addEventListener('DOMContentLoaded', () => {
            initializeData();
            setupEventListeners();
        });

        function initializeData() {
            createSampleData();
            loadProducts();
            checkLoginStatus();
            setTimeout(() => {
                displayProducts();
                displayLocalProducts();
            }, 800);
        }

        function createSampleData() {
            if (!localStorage.getItem('plantiaProducts')) {
                const samples = [
                    { id: 1, title: "몬스테라 아단소니", price: 12000, category: "관엽식물", status: "판매중", sellerLocation: "서울 강남구", likes: 12, createdDate: "2024-01-20", description: "잎이 아주 건강해요!" },
                    { id: 2, title: "다육이 염좌", price: 25000, category: "다육이", status: "판매중", sellerLocation: "경기 성남시", likes: 5, createdDate: "2024-01-22", description: "대형 화분 포함입니다." },
                    { id: 3, title: "독일 토분 15호", price: 8000, category: "화분/흙", status: "판매중", sellerLocation: "서울 마포구", likes: 21, createdDate: "2024-01-25", description: "미사용 새제품이에요." },
                    { id: 4, title: "스킨답서스 나눔", price: 0, category: "관엽식물", status: "판매중", sellerLocation: "서울 서초구", likes: 45, createdDate: "2024-01-27", description: "뿌리 잘 내렸어요." },
                    { id: 5, title: "식물 관리 노하우", price: 0, category: "정보공유", status: "정보", sellerLocation: "부산 해운대구", likes: 89, createdDate: "2024-01-15", description: "겨울철 관리법 공유합니다." }
                ];
                localStorage.setItem('plantiaProducts', JSON.stringify(samples));
            }
        }

        function loadProducts() {
            const data = localStorage.getItem('plantiaProducts');
            allProducts = data ? JSON.parse(data) : [];
        }

        function displayProducts() {
            const container = document.getElementById('productGrid');
            if (!container) return;
            let filtered = currentFilter === 'all' ? [...allProducts] : allProducts.filter(p => p.category === currentFilter);
            if (currentSort === 'price') filtered.sort((a, b) => a.price - b.price);
            else filtered.sort((a, b) => new Date(b.createdDate) - new Date(a.createdDate));
            document.getElementById('sectionTitle').textContent = currentFilter === 'all' ? '최신 식물' : currentFilter;
            
            let html = filtered.map(p => createCardHtml(p)).join('');
            html += `<div onclick="location.href='add-product.html'" class="product-card border-2 border-dashed border-green-200 rounded-2xl flex flex-col items-center justify-center p-6 text-green-600 hover:bg-green-50 min-h-[280px]">
                        <i class="fas fa-plus-circle text-3xl mb-2"></i><span class="font-medium">나도 등록하기</span>
                    </div>`;
            container.innerHTML = html;
        }

        function createCardHtml(p) {
            const isFree = p.price === 0;
            const imgUrl = `https://loremflickr.com/400/400/plant,pot?lock=${p.id}`;
            return `
                <div class="product-card bg-white rounded-2xl overflow-hidden shadow-sm flex flex-col" onclick="viewProduct(${p.id})">
                    <div class="product-image-container">
                        <img src="${imgUrl}" class="product-image" alt="식물" loading="lazy">
                        ${isFree ? '<div class="sold-out-badge bg-green-600">무료나눔</div>' : ''}
                    </div>
                    <div class="p-4 flex flex-col flex-grow">
                        <h3 class="text-sm font-semibold text-gray-800 line-clamp-2 mb-2 h-10">${p.title}</h3>
                        <div class="mt-auto">
                            <p class="price-tag text-base mb-2">${isFree ? '나눔 🌱' : p.price.toLocaleString() + '원'}</p>
                            <div class="flex items-center justify-between text-[11px] text-gray-400 border-t pt-2">
                                <span>${p.sellerLocation}</span>
                                <div class="flex items-center space-x-2">
                                    <span><i class="far fa-heart mr-0.5"></i>${p.likes}</span>
                                    <span>${formatDate(p.createdDate)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function viewProduct(id) {
            const p = allProducts.find(x => x.id === id);
            if (!p) return;
            const modal = document.getElementById('productModal');
            const content = document.getElementById('modalContent');
            const isFree = p.price === 0;
            const imgUrl = `https://loremflickr.com/600/600/plant,pot?lock=${p.id}`;

            content.innerHTML = `
                <div class="flex flex-col md:flex-row">
                    <div class="md:w-1/2 h-80 md:h-auto overflow-hidden">
                        <img src="${imgUrl}" class="w-full h-full object-cover" alt="${p.title}">
                    </div>
                    <div class="md:w-1/2 p-6 md:p-8 flex flex-col">
                        <div class="flex items-center space-x-2 mb-2">
                            <span class="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full">${p.category}</span>
                            <span class="text-xs text-gray-400">${p.status}</span>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-800 mb-4">${p.title}</h2>
                        <div class="flex items-center space-x-3 mb-6">
                            <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center"><i class="fas fa-user text-gray-400"></i></div>
                            <div>
                                <p class="text-sm font-bold text-gray-800">${p.seller || '익명의 집사'}</p>
                                <p class="text-[11px] text-gray-400">${p.sellerLocation}</p>
                            </div>
                        </div>
                        <div class="flex-grow"><p class="text-gray-600 leading-relaxed text-sm whitespace-pre-line mb-6">${p.description || "건강하게 잘 키운 식물입니다!"}</p></div>
                        <div class="mt-4 pt-6 border-t flex items-center justify-between">
                            <div><p class="text-xs text-gray-400">희망가</p><p class="text-2xl font-black text-green-700">${isFree ? '무료나눔 🌱' : p.price.toLocaleString() + '원'}</p></div>
                            <button onclick="startChat('${p.seller || '판매자'}')" class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-700 shadow-lg">채팅하기</button>
                        </div>
                    </div>
                </div>`;
            modal.classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            const modal = document.getElementById('productModal');
            modal.classList.replace('flex', 'hidden');
            document.body.style.overflow = 'auto';
        }

        function handleOutsideClick(e) { if(e.target.id === 'productModal') closeModal(); }
        function startChat(seller) { alert(`${seller}님과 채팅을 시작합니다. (준비 중인 기능입니다)`); }
        function formatDate(d) {
            const diff = Math.floor((new Date() - new Date(d)) / (1000 * 60 * 60 * 24));
            return diff === 0 ? '오늘' : diff < 7 ? `${diff}일 전` : d;
        }
        function filterProducts(cat) { currentFilter = cat; displayProducts(); }
        function sortProducts(type) {
            currentSort = type;
            document.getElementById('sortRecentBtn').className = type === 'recent' ? 'text-green-600' : 'text-gray-400 hover:text-green-600';
            document.getElementById('sortPriceBtn').className = type === 'price' ? 'text-green-600' : 'text-gray-400 hover:text-green-600';
            displayProducts();
        }
        function checkLoginStatus() {
            const user = JSON.parse(localStorage.getItem('plantiaUser') || 'null');
            const authDiv = document.getElementById('authButtons');
            if (user) {
                authDiv.innerHTML = `<button onclick="showUserMenu()" class="w-8 h-8 bg-green-100 rounded-full text-green-700 font-bold flex items-center justify-center border border-green-200">${user.name[0]}</button>`;
                document.getElementById('localProductsSection').classList.remove('hidden');
            } else {
                authDiv.innerHTML = `<button onclick="location.href='login.html'" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200"><i class="fas fa-user"></i></button>`;
            }
        }
        function displayLocalProducts() {
            const user = JSON.parse(localStorage.getItem('plantiaUser') || 'null');
            if (!user || !user.location) return;
            const grid = document.getElementById('localProductGrid');
            const localItems = allProducts.filter(p => p.sellerLocation.includes(user.location.split(' ')[0])).slice(0, 6);
            if (localItems.length > 0) {
                grid.innerHTML = localItems.map(p => createCardHtml(p)).join('');
                document.getElementById('localSectionTitle').textContent = `${user.location} 인기 식물`;
            }
        }
        function showFavorites() { alert('관심 상품 목록입니다.'); }
        function showUserMenu() { if(confirm('로그아웃 하시겠습니까?')) { localStorage.removeItem('plantiaUser'); location.reload(); } }
        function refreshLocalProducts() { location.reload(); }
        function setupEventListeners() { window.addEventListener('storage', () => { loadProducts(); displayProducts(); }); }
    </script>
</body>
</html>
