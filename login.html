<!-- 수정된 login.html 예시 -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - PlantiaWorld</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .login-gradient {
            background: linear-gradient(135deg, #f8fdf8 0%, #e8f5e9 100%);
        }
    </style>
</head>
<body class="login-gradient min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- 로고 -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-leaf text-white text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-green-800">PlantiaWorld</h1>
            <p class="text-gray-600">이웃과 식물을 나누는 공간</p>
        </div>

        <!-- 로그인 폼 -->
        <div class="bg-white rounded-2xl p-8 shadow-lg">
            <h2 class="text-xl font-bold text-gray-800 mb-6">로그인</h2>
            
            <form id="loginForm">
                <!-- 이메일 입력 -->
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2" for="email">
                        이메일
                    </label>
                    <input type="email" 
                           id="email" 
                           placeholder="이메일을 입력하세요"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none"
                           autocomplete="email"
                           required>
                </div>

                <!-- 비밀번호 입력 -->
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2" for="password">
                        비밀번호
                    </label>
                    <input type="password" 
                           id="password" 
                           placeholder="비밀번호를 입력하세요"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none"
                           autocomplete="current-password"
                           required>
                </div>

                <!-- 비밀번호 찾기 링크 -->
                <div class="text-right mb-6">
                    <a href="#" class="text-green-600 hover:text-green-800 text-sm">
                        비밀번호 찾기
                    </a>
                </div>

                <!-- 로그인 버튼 -->
                <button type="submit" 
                        class="w-full bg-green-600 text-white py-3 rounded-lg font-medium hover:bg-green-700 transition-colors mb-4">
                    로그인
                </button>

                <!-- 회원가입 링크 -->
                <div class="text-center">
                    <span class="text-gray-600">계정이 없으신가요? </span>
                    <a href="register.html" class="text-green-600 hover:text-green-800 font-medium">
                        회원가입
                    </a>
                </div>
            </form>

            <!-- 소셜 로그인 -->
            <div class="mt-8 pt-8 border-t">
                <p class="text-center text-gray-600 mb-4">간편 로그인</p>
                <div class="flex justify-center space-x-4">
                    <button class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700">
                        <i class="fab fa-facebook-f"></i>
                    </button>
                    <button class="w-12 h-12 bg-red-500 text-white rounded-full flex items-center justify-center hover:bg-red-600">
                        <i class="fab fa-google"></i>
                    </button>
                    <button class="w-12 h-12 bg-black text-white rounded-full flex items-center justify-center hover:bg-gray-800">
                        <i class="fab fa-apple"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 홈으로 돌아가기 -->
        <div class="text-center mt-6">
            <a href="index.html" class="text-gray-600 hover:text-green-800">
                <i class="fas fa-arrow-left mr-2"></i>홈으로 돌아가기
            </a>
        </div>
    </div>

    <!-- Font Awesome -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <script>
        // 로그인 폼 처리
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // 간단한 로그인 처리 (실제로는 서버와 연동 필요)
            if (email && password) {
                // 테스트용 사용자 데이터 저장
                const userData = {
                    email: email,
                    name: email.split('@')[0], // 이메일 앞부분을 이름으로 사용
                    location: '서울'
                };
                
                localStorage.setItem('plantiaUser', JSON.stringify(userData));
                
                alert('로그인 성공!');
                window.location.href = 'index.html';
            } else {
                alert('이메일과 비밀번호를 입력해주세요.');
            }
        });

        // 페이지 로드 시 입력창 초기화
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        });
    </script>
</body>
</html>
