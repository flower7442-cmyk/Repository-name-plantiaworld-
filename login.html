<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - PlantiaWorld</title>
    <!-- Font Awesome 아이콘 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .plant-gradient {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        }
        .btn-plant {
            background: linear-gradient(135deg, #2e8b57 0%, #32cd32 100%);
        }
        .btn-plant:hover {
            background: linear-gradient(135deg, #228B22 0%, #2e8b57 100%);
        }
    </style>
</head>
<body class="plant-gradient min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden max-w-md w-full">
        <!-- 헤더 -->
        <div class="bg-green-600 text-white p-6 text-center">
            <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-leaf text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold">PlantiaWorld</h1>
            <p class="text-green-100 mt-2">이웃과 식물을 나누는 공간</p>
        </div>

        <!-- 로그인 폼 -->
        <div class="p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">로그인</h2>
            
            <form id="loginForm" class="space-y-6">
                <!-- 이메일 입력 -->
                <div>
                    <label class="block text-gray-700 font-medium mb-2">
                        <i class="fas fa-envelope mr-2 text-green-600"></i>이메일
                    </label>
                    <input type="email" id="email" 
                           class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
                           placeholder="plant@world.com" required>
                </div>

                <!-- 비밀번호 입력 -->
                <div>
                    <label class="block text-gray-700 font-medium mb-2">
                        <i class="fas fa-lock mr-2 text-green-600"></i>비밀번호
                    </label>
                    <input type="password" id="password" 
                           class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
                           placeholder="••••••••" required>
                    <div class="text-right mt-2">
                        <a href="#" class="text-sm text-green-600 hover:text-green-800">비밀번호 찾기</a>
                    </div>
                </div>

                <!-- 로그인 버튼 -->
                <button type="submit" 
                        class="btn-plant w-full text-white font-bold py-4 rounded-xl text-lg shadow-lg hover:shadow-xl transition-all duration-300">
                    <i class="fas fa-sign-in-alt mr-2"></i>로그인
                </button>

                <!-- 회원가입 링크 -->
                <div class="text-center pt-4 border-t">
                    <p class="text-gray-600">계정이 없으신가요?</p>
                    <a href="/register.html" 
                       class="inline-block mt-2 px-6 py-2 border-2 border-green-600 text-green-600 font-bold rounded-xl hover:bg-green-50 transition">
                        회원가입
                    </a>
                </div>
            </form>

            <!-- 소셜 로그인 -->
            <div class="mt-8 pt-6 border-t">
                <p class="text-gray-600 text-center mb-4">간편 로그인</p>
                <div class="flex justify-center space-x-6">
                    <button class="social-btn bg-blue-100 hover:bg-blue-200">
                        <i class="fab fa-facebook-f text-blue-600"></i>
                    </button>
                    <button class="social-btn bg-red-100 hover:bg-red-200">
                        <i class="fab fa-google text-red-600"></i>
                    </button>
                    <button class="social-btn bg-gray-100 hover:bg-gray-200">
                        <i class="fab fa-github text-gray-800"></i>
                    </button>
                </div>
            </div>

            <!-- 홈으로 돌아가기 -->
            <div class="text-center mt-6">
                <a href="/" class="text-gray-500 hover:text-gray-700 text-sm">
                    <i class="fas fa-home mr-1"></i>홈으로 돌아가기
                </a>
            </div>
        </div>
    </div>

    <script>
        // 로그인 폼 처리
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // 간단한 유효성 검사
            if (!email || !password) {
                showMessage('이메일과 비밀번호를 입력해주세요.', 'error');
                return;
            }
            
            if (!validateEmail(email)) {
                showMessage('유효한 이메일 주소를 입력해주세요.', 'error');
                return;
            }
            
            // 임시 로그인 처리 (실제로는 Firebase/AJAX 요청)
            const userData = {
                email: email,
                name: email.split('@')[0],
                loginTime: new Date().toLocaleString()
            };
            
            // 로컬스토리지에 저장 (임시)
            localStorage.setItem('plantiaUser', JSON.stringify(userData));
            
            // 성공 메시지
            showMessage('로그인 성공! 홈으로 이동합니다.', 'success');
            
            // 2초 후 홈으로 이동
            setTimeout(() => {
                window.location.href = '/index.html';
            }, 2000);
        });
        
        // 소셜 로그인 버튼들
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const platform = this.querySelector('i').className.includes('facebook') ? 'Facebook' :
                               this.querySelector('i').className.includes('google') ? 'Google' : 'GitHub';
                showMessage(`${platform} 로그인은 준비 중입니다.`, 'info');
            });
        });
        
        // 유틸리티 함수들
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        function showMessage(message, type) {
            // 기존 메시지 제거
            const existingMsg = document.getElementById('messageBox');
            if (existingMsg) existingMsg.remove();
            
            // 새 메시지 생성
            const messageBox = document.createElement('div');
            messageBox.id = 'messageBox';
            
            const colors = {
                success: 'bg-green-100 border-green-500 text-green-700',
                error: 'bg-red-100 border-red-500 text-red-700',
                info: 'bg-blue-100 border-blue-500 text-blue-700'
            };
            
            messageBox.className = `fixed top-4 left-1/2 transform -translate-x-1/2 p-4 rounded-xl border-2 shadow-lg z-50 ${colors[type]}`;
            messageBox.innerHTML = `
                <div class="flex items-center">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'} mr-3 text-lg"></i>
                    <span class="font-medium">${message}</span>
                    <button onclick="this.parentElement.parentElement.remove()" class="ml-4 text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;
            
            document.body.appendChild(messageBox);
            
            // 5초 후 자동 제거
            setTimeout(() => {
                if (messageBox.parentElement) {
                    messageBox.remove();
                }
            }, 5000);
        }
        
        // 페이지 로드시 사용자 상태 확인
        window.addEventListener('load', function() {
            const user = localStorage.getItem('plantiaUser');
            if (user) {
                const userData = JSON.parse(user);
                showMessage(`${userData.name}님, 다시 오신 것을 환영합니다!`, 'info');
            }
        });
    </script>
</body>
</html>
