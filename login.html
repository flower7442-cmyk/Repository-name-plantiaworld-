<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - PlantiaWorld</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .plant-bg {
            background-image: url('https://images.unsplash.com/photo-1545241047-6083a3684587?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-login {
            background: linear-gradient(135deg, #2e8b57 0%, #32cd32 100%);
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 139, 87, 0.3);
        }
    </style>
</head>
<body class="plant-bg min-h-screen flex items-center justify-center p-4">

    <div class="glass-morphism w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-8 md:p-10">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-green-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fas fa-leaf text-white text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">반가워요, 식물 집사님!</h1>
                <p class="text-gray-500 mt-2">PlantiaWorld에 로그인하여 초록빛 일상을 나눠요.</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Nickname</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="username" required 
                               class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-transparent focus:border-green-500 focus:bg-white rounded-xl outline-none transition-all" 
                               placeholder="닉네임을 입력하세요">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Location</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i class="fas fa-map-marker-alt"></i>
                        </span>
                        <select id="userLocation" required 
                                class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-transparent focus:border-green-500 focus:bg-white rounded-xl outline-none transition-all appearance-none">
                            <option value="">활동 지역 선택</option>
                            <option value="서울 강남구">서울 강남구</option>
                            <option value="서울 마포구">서울 마포구</option>
                            <option value="경기 성남시">경기 성남시</option>
                            <option value="부산 해운대구">부산 해운대구</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-login w-full py-4 text-white font-bold rounded-xl shadow-lg mt-4">
                    시작하기
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-gray-500">
                <p>계정이 없으신가요? <a href="#" class="text-green-600 font-bold hover:underline">회원가입</a></p>
            </div>
        </div>
        
        <div class="bg-gray-50 px-8 py-4 text-center border-t border-gray-100">
            <span class="text-xs text-gray-400 italic">"식물과 함께 숨 쉬는 행복한 세상"</span>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('username').value;
            const locationStr = document.getElementById('userLocation').value;

            if (!name || !locationStr) {
                alert('닉네임과 지역을 선택해주세요!');
                return;
            }

            // 사용자 정보 저장 (회원가입 기능이 따로 없으므로 로그인 시 저장)
            const userData = {
                name: name,
                location: locationStr,
                loginTime: new Date().getTime()
            };

            localStorage.setItem('plantiaUser', JSON.stringify(userData));

            // 로그인 성공 피드백
            alert(`${name}님, 환영합니다! 🌱\n이제 ${locationStr}의 이웃들을 만나보세요.`);
            
            // 메인 페이지로 이동
            window.location.href = 'index.html';
        });

        // 이미 로그인된 상태인지 확인
        window.onload = function() {
            if (localStorage.getItem('plantiaUser')) {
                if (confirm('이미 로그인되어 있습니다. 메인으로 이동할까요?')) {
                    window.location.href = 'index.html';
                }
            }
        };
    </script>
</body>
</html>
