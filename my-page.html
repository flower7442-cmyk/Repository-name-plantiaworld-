<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - PlantiaWorld</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #f0fdf4 100%);
            color: #334155; 
        }
        .modern-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04); border: 1px solid rgba(229, 231, 235, 0.6); overflow: hidden; }
        
        /* 탭 디자인 */
        .nav-tab { cursor: pointer; color: #64748b; padding: 1rem 0; font-weight: 500; border-bottom: 3px solid transparent; text-align: center; flex: 1; }
        .nav-tab.active { color: #16a34a; font-weight: 700; border-bottom-color: #16a34a; }
        
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-sm border-b border-gray-100">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-green-600 rounded-full flex items-center justify-center">
                    <i class="fas fa-leaf text-white text-sm"></i>
                </div>
                <span class="font-bold text-lg text-gray-800">Plantia</span>
            </a>
            <button onclick="location.href='index.html'" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-6 max-w-6xl mx-auto">
            
            <div class="lg:w-1/3 space-y-5">
                <div class="modern-card p-6 text-center">
                    <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-md">
                        <i class="fas fa-user text-green-600 text-3xl"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-800" id="userNameDisplay">사용자</h2>
                    <p class="text-emerald-600 font-medium mb-3" id="userLocationDisplay">📍 지역 정보</p>
                    <button onclick="logout()" class="text-xs text-gray-400 underline hover:text-rose-500">로그아웃</button>
                </div>
            </div>

            <div class="lg:w-2/3">
                <div class="modern-card mb-6 flex">
                    <div onclick="switchTab('my')" id="tab-my" class="nav-tab active">내가 올린 식물</div>
                    <div onclick="switchTab('wish')" id="tab-wish" class="nav-tab">찜한 목록</div>
                    <div onclick="switchTab('set')" id="tab-set" class="nav-tab">설정</div>
                </div>

                <div id="section-my" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full py-20 text-center text-gray-400">
                        <p>등록된 식물이 없습니다.</p>
                    </div>
                </div>

                <div id="section-wish" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
                    <div class="col-span-full py-20 text-center text-gray-400">
                        <p>찜한 식물이 없습니다.</p>
                    </div>
                </div>

                <div id="section-set" class="modern-card p-8 hidden">
                    <h3 class="font-bold text-lg mb-6">회원 정보 수정</h3>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">닉네임</label>
                            <input type="text" id="editNameInput" class="w-full p-3 border rounded-xl outline-none focus:border-green-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">내 동네</label>
                            <input type="text" id="editLocInput" class="w-full p-3 border rounded-xl outline-none focus:border-green-500">
                        </div>
                        <button onclick="saveProfile()" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl shadow-md hover:bg-green-700 transition">수정 완료</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 페이지가 열리면 바로 실행되는 부분
        document.addEventListener('DOMContentLoaded', () => {
            const userData = JSON.parse(localStorage.getItem('plantiaUser'));
            
            // 로그인 안 되어 있으면 로그인 페이지로 보냄
            if (!userData) {
                alert('로그인이 필요합니다.');
                location.href = 'final-login.html'; 
                return;
            }

            // 사용자 정보 화면에 표시
            document.getElementById('userNameDisplay').textContent = userData.name;
            document.getElementById('userLocationDisplay').textContent = `📍 ${userData.location}`;
            document.getElementById('editNameInput').value = userData.name;
            document.getElementById('editLocInput').value = userData.location;

            // 데이터 불러오기
            loadMyPlants();
            loadWishlist();
        });

        // 탭 전환 기능
        function switchTab(tabName) {
            // 모든 탭 비활성화
            ['my', 'wish', 'set'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('active');
                document.getElementById(`section-${t}`).classList.add('hidden');
            });
            // 선택한 탭만 활성화
            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.getElementById(`section-${tabName}`).classList.remove('hidden');
        }

        // 내가 올린 게시물 불러오기
        function loadMyPlants() {
            const products = JSON.parse(localStorage.getItem('plantiaProducts') || '[]');
            const container = document.getElementById('section-my');
            
            if (products.length > 0) {
                container.innerHTML = ''; // 비우기
                products.forEach(p => {
                    container.innerHTML += `
                        <div class="modern-card p-4 flex items-center gap-4">
                            <img src="${p.images[0]}" class="w-16 h-16 object-cover rounded-xl">
                            <div class="flex-1">
                                <h4 class="font-bold text-sm">${p.title}</h4>
                                <p class="text-green-600 text-xs">${p.price.toLocaleString()}원</p>
                            </div>
                            <button onclick="deleteMyPlant(${p.id})" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div>`;
                });
            }
        }

        // 찜한 목록 불러오기
        function loadWishlist() {
            const wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
            const products = JSON.parse(localStorage.getItem('plantiaProducts') || '[]');
            const wishItems = products.filter(p => wishlist.includes(p.id));
            const container = document.getElementById('section-wish');

            if (wishItems.length > 0) {
                container.innerHTML = '';
                wishItems.forEach(p => {
                    container.innerHTML += `
                        <div class="modern-card p-4 flex items-center gap-4 border-l-4 border-rose-400">
                            <img src="${p.images[0]}" class="w-16 h-16 object-cover rounded-xl">
                            <div class="flex-1">
                                <h4 class="font-bold text-sm">${p.title}</h4>
                                <p class="text-green-600 text-xs">${p.price.toLocaleString()}원</p>
                            </div>
                            <i class="fas fa-heart text-rose-400"></i>
                        </div>`;
                });
            }
        }

        // 프로필 정보 저장
        function saveProfile() {
            const user = JSON.parse(localStorage.getItem('plantiaUser'));
            user.name = document.getElementById('editNameInput').value;
            user.location = document.getElementById('editLocInput').value;
            
            localStorage.setItem('plantiaUser', JSON.stringify(user));
            alert('정보가 성공적으로 수정되었습니다! 🌱');
            location.reload();
        }

        // 게시물 삭제
        function deleteMyPlant(id) {
            if (confirm('정말 이 게시물을 삭제하시겠습니까?')) {
                let products = JSON.parse(localStorage.getItem('plantiaProducts') || '[]');
                products = products.filter(p => p.id !== id);
                localStorage.setItem('plantiaProducts', JSON.stringify(products));
                location.reload();
            }
        }

        // 로그아웃
        function logout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                localStorage.removeItem('plantiaUser');
                location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
