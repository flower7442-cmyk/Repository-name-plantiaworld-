<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식물 상세 정보 - PlantiaWorld</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fff; }
        .slider-container { position: relative; overflow: hidden; background: #f3f4f6; aspect-ratio: 1 / 1; }
        .slider-wrapper { display: flex; transition: transform 0.3s ease-out; height: 100%; }
        .slider-item { min-width: 100%; height: 100%; object-fit: cover; }
        .indicator { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); transition: 0.3s; }
        .dot.active { background: #fff; width: 20px; border-radius: 4px; }
        .floating-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #eee; padding: 16px; z-index: 50; }
    </style>
</head>
<body class="pb-24">

    <header class="fixed top-0 left-0 right-0 z-50 flex justify-between p-4 items-center">
        <button onclick="history.back()" class="w-10 h-10 bg-white/80 backdrop-blur rounded-full shadow flex items-center justify-center">
            <i class="fas fa-arrow-left text-gray-800"></i>
        </button>
        <button onclick="shareLink()" class="w-10 h-10 bg-white/80 backdrop-blur rounded-full shadow flex items-center justify-center">
            <i class="fas fa-share-alt text-gray-800"></i>
        </button>
    </header>

    <div class="slider-container">
        <div id="sliderWrapper" class="slider-wrapper">
            </div>
        <div id="sliderIndicator" class="indicator"></div>
    </div>

    <main class="px-5 py-6 max-w-2xl mx-auto">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-green-600">
                    <i class="fas fa-user text-xl"></i>
                </div>
                <div>
                    <h3 class="font-bold text-gray-800">초록이웃</h3>
                    <p id="productLocation" class="text-xs text-gray-500"></p>
                </div>
            </div>
            <div class="text-right">
                <span class="inline-block px-3 py-1 bg-green-50 text-green-600 rounded-full text-xs font-bold mb-1">매너온도 37.5°C</span>
            </div>
        </div>

        <hr class="border-gray-100 mb-6">

        <h2 id="productTitle" class="text-2xl font-bold text-gray-900 mb-2"></h2>
        <div class="flex gap-2 text-sm text-gray-400 mb-4">
            <span id="productCategory"></span> • <span id="productDate"></span>
        </div>
        
        <p id="productDescription" class="text-gray-700 leading-relaxed whitespace-pre-wrap mb-8"></p>

        <div class="flex gap-4 text-sm text-gray-400">
            <span id="likeCountDisplay">관심 0</span> • <span>조회 12</span>
        </div>
    </main>

    <div class="floating-bottom flex items-center justify-between max-w-2xl mx-auto">
        <div class="flex items-center gap-4">
            <button id="likeBtn" onclick="toggleLike()" class="text-gray-400 text-2xl transition-colors">
                <i class="far fa-heart"></i>
            </button>
            <div class="h-10 w-[1px] bg-gray-200"></div>
            <div>
                <p id="productPrice" class="text-xl font-bold text-gray-900"></p>
                <p class="text-xs text-green-600 font-bold">가격 제안 불가</p>
            </div>
        </div>
        <button onclick="startChat()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-green-700 transition">
            채팅하기
        </button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const products = JSON.parse(localStorage.getItem('plantiaProducts') || '[]');
        const product = products.find(p => p.id == productId);

        if (!product) {
            alert('존재하지 않거나 삭제된 게시글입니다.');
            location.href = 'index.html';
        } else {
            // 데이터 매핑: index.html의 필드명과 일치시킴
            document.getElementById('productTitle').innerText = product.title;
            document.getElementById('productCategory').innerText = product.category;
            // sellerLocation 또는 location 중 있는 데이터를 표시
            document.getElementById('productLocation').innerText = product.sellerLocation || product.location || '지역 정보 없음';
            // createdDate 또는 date 중 있는 데이터를 표시
            document.getElementById('productDate').innerText = product.createdDate || product.date || '방금 전';
            document.getElementById('productDescription').innerText = product.description;
            document.getElementById('productPrice').innerText = product.price === 0 ? '나눔 🌱' : product.price.toLocaleString() + '원';
            document.getElementById('likeCountDisplay').innerText = `관심 ${product.likes || 0}`;

            const wrapper = document.getElementById('sliderWrapper');
            const indicator = document.getElementById('sliderIndicator');

            // 이미지 처리 로직 보완
            const imagesToShow = (product.images && product.images.length > 0) 
                ? product.images 
                : [`https://loremflickr.com/800/800/plant,pot?lock=${product.id}`];

            imagesToShow.forEach((imgSrc, idx) => {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.className = 'slider-item';
                wrapper.appendChild(img);

                const dot = document.createElement('div');
                dot.className = `dot ${idx === 0 ? 'active' : ''}`;
                indicator.appendChild(dot);
            });

            let currentIdx = 0;
            const dots = document.querySelectorAll('.dot');
            if (imagesToShow.length > 1) {
                setInterval(() => {
                    currentIdx = (currentIdx + 1) % imagesToShow.length;
                    wrapper.style.transform = `translateX(-${currentIdx * 100}%)`;
                    dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
                }, 4000);
            }
        }

        // 추가된 인터랙션 기능
        function toggleLike() {
            const likeBtn = document.getElementById('likeBtn');
            const icon = likeBtn.querySelector('i');
            if (icon.classList.contains('far')) {
                icon.classList.replace('far', 'fas');
                likeBtn.classList.add('text-red-500');
                alert('관심 목록에 추가되었습니다.');
            } else {
                icon.classList.replace('fas', 'far');
                likeBtn.classList.remove('text-red-500');
            }
        }

        function startChat() {
            alert('채팅 서비스 준비 중입니다. 이웃과 대화하려면 조금만 기다려주세요!');
        }

        function shareLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('링크가 복사되었습니다. 이웃에게 공유해보세요!');
            });
        }
    </script>
</body>
</html>
